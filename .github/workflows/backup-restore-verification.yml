name: Production backup and restore verification

on:
  schedule:
    - cron: '17 16 * * *'
  workflow_dispatch:

concurrency:
  group: production-backup-restore
  cancel-in-progress: false

jobs:
  backup-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client, AWS CLI and jq
        run: sudo apt-get update && sudo apt-get install -y postgresql-client awscli jq
      - name: Create encrypted backup and prove a clean restore
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_KMS_KEY_ID: ${{ secrets.BACKUP_KMS_KEY_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-southeast-2
          CAPLET_API_BASE_URL: ${{ secrets.CAPLET_API_BASE_URL }}
          CAPLET_OPS_SERVICE_TOKEN: ${{ secrets.CAPLET_OPS_SERVICE_TOKEN }}
          RESTORE_POSTGRES_HOST: 127.0.0.1
          RESTORE_POSTGRES_USER: postgres
          RESTORE_POSTGRES_PASSWORD: postgres
        run: bash backend/scripts/backup-restore-drill.sh
