        - heading "Common questions" [level=2] [ref=e241]
        - generic [ref=e242]:
          - generic [ref=e243]:
            - button "Is Caplet really free?" [expanded] [ref=e244]:
              - generic [ref=e245]: Is Caplet really free?
              - img [ref=e246]
            - paragraph [ref=e250]: Yes, genuinely. Caplet is an open learning playground with no subscription tiers, no per-seat pricing, and no user limits. Teachers and students build and complete whole courses without ever hitting a paywall, and there are no ads and nothing sold on the side. The finance tools, the lesson builder, the AI tutor, and classrooms are all included.
          - generic [ref=e251]:
            - button "How do I publish my own curriculum?" [ref=e252]:
              - generic [ref=e253]: How do I publish my own curriculum?
              - img [ref=e254]
            - paragraph [ref=e256]: "Sign up, open your dashboard, and create a course. Add modules and lessons, then drag in blocks: rich text, images, video, live code, graphing panels, and quizzes. Rearrange anything, preview it the way a student would see it, and share the link the moment it is ready. You can keep editing after publishing, and every change goes live instantly."
          - generic [ref=e257]:
            - button "Can I host Caplet on my own servers?" [ref=e258]:
              - generic [ref=e259]: Can I host Caplet on my own servers?
              - img [ref=e260]
            - paragraph [ref=e262]: Yes. Caplet is fully open-source. Pull the code from the repository and deploy it on your own servers or a private cloud. It runs a React frontend and a Node and Express backend, using Postgres in production and SQLite for local development, so a single laptop is enough to get started.
          - generic [ref=e263]:
            - button "Does it support grading and tests?" [ref=e264]:
              - generic [ref=e265]: Does it support grading and tests?
              - img [ref=e266]
            - paragraph [ref=e268]: It does. Embed live coding playgrounds with test runners, quiz blocks, and grading workflows that track every learner automatically. Group students into classrooms, set assignments with due dates, and watch submissions arrive in real time, with spaced repetition to help the material actually stick.
          - generic [ref=e269]:
            - button "Are the financial calculators specific to Australia?" [ref=e270]:
              - generic [ref=e271]: Are the financial calculators specific to Australia?
              - img [ref=e272]
            - paragraph [ref=e274]: Yes. Every calculator is built around Australian rules, including income tax brackets, the Medicare levy, superannuation, GST, and HECS and HELP. The new Debt Sequencer models HECS the way it actually works, indexed once a year rather than charged monthly interest, so the guidance stays correct instead of copying a generic overseas template. These are educational tools, not personal financial advice.
          - generic [ref=e275]:
            - button "Is my financial data private?" [ref=e276]:
              - generic [ref=e277]: Is my financial data private?
              - img [ref=e278]
            - paragraph [ref=e280]: Your figures never leave your account. Your financial profile is stored against your login and used only to pre-fill the tools you choose to open. We do not sell data, we do not show ads, and nothing you enter is shared with third parties.
          - generic [ref=e281]:
            - button "Do I need to know how to code to build a lesson?" [ref=e282]:
              - generic [ref=e283]: Do I need to know how to code to build a lesson?
              - img [ref=e284]
            - paragraph [ref=e286]: Not at all. Building a lesson is drag-and-drop, and you can assemble a full lesson in minutes without writing a single line of code. If you do want code, the live IDE runs Python, JavaScript, and HTML right in the browser, so you can add runnable examples whenever they help.
          - generic [ref=e287]:
            - button "Can I use AI to help build a course?" [ref=e288]:
              - generic [ref=e289]: Can I use AI to help build a course?
              - img [ref=e290]
            - paragraph [ref=e292]: Yes. Describe a topic and Caplet drafts structured slides, quizzes, and a lesson plan for you to edit, so a blank page is never the starting point. An in-slide AI tutor also gives students hints and worked examples without leaving the lesson. The AI helps you create; it never touches the deterministic finance calculators.
