        - generic [ref=e204]:
          - generic [ref=e205]:
            - button "What is financial literacy and why is it important? +" [ref=e206] [cursor=pointer]:
              - generic [ref=e207]: What is financial literacy and why is it important?
              - generic [ref=e208]: +
            - paragraph [ref=e209]: Financial literacy means understanding how money decisions affect your daily life and long-term outcomes. It helps you budget with less stress, avoid expensive debt mistakes, and make clearer choices about tax, super, and investing. In practice, it gives you more control and fewer surprises.
          - generic [ref=e210]:
            - button "How is CapletEdu different from other platforms? +" [ref=e211] [cursor=pointer]:
              - generic [ref=e212]: How is CapletEdu different from other platforms?
              - generic [ref=e213]: +
            - paragraph [ref=e214]: CapletEdu is specifically designed for institutional integration into school curricula. We work directly with educators to develop structured lessons tailored to Australian students. Currently integrated into Knox Grammar School Commerce Department and used by Capital Finance Club.
          - generic [ref=e215]:
            - button "Is CapletEdu free to use? +" [ref=e216] [cursor=pointer]:
              - generic [ref=e217]: Is CapletEdu free to use?
              - generic [ref=e218]: +
            - paragraph [ref=e219]: Yes. CapletEdu currently provides free educational services. Courses and tools are accessible at no cost. Future development may include SaaS offerings for schools and large institutions.
          - generic [ref=e220]:
            - button "What topics are covered? +" [ref=e221] [cursor=pointer]:
              - generic [ref=e222]: What topics are covered?
              - generic [ref=e223]: +
            - paragraph [ref=e224]: "CapletEdu covers financial fundamentals tailored to Australian students: budgeting, tax, superannuation, investing basics, and business finance. All content is structured with Australian context and designed for integration into school curricula."
          - generic [ref=e225]:
